<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뷰티파크 AI 사무실</title>
<style>
  :root{
    --bg:#f0ecdd; --panel:#ffffff; --ink:#3b3630; --sub:#8a8378;
    --office:#2b2521; --room:#38312a; --floor:#453d34; --chip:#1f1b17;
    --accent:#e0674f; --accent-soft:#fbe7e2; --line:#e5dfd2; --green:#4c9a63;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden;}

  /* ── header ── */
  header{display:flex; align-items:baseline; gap:12px; padding:14px 22px;}
  header h1{font-size:22px; letter-spacing:-.5px;}
  header .sub{font-size:13px; color:var(--sub);}
  header .spacer{flex:1;}
  .status-badge{font-size:12px; color:#3c7a4f; background:#fff; border:1px solid var(--line); border-radius:999px; padding:5px 14px;}
  .status-badge::before{content:"●"; color:var(--green); margin-right:6px; font-size:9px;}
  .gear{cursor:pointer; border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 12px; font-size:12px; color:var(--sub);}

  main{flex:1; display:flex; gap:16px; padding:0 16px 16px; min-height:0;}

  /* ── office (left) ── */
  #office{flex:1.1; background:var(--office); border-radius:14px; padding:14px; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:12px; position:relative; min-width:0;}
  .room{background:var(--room); border:2px solid transparent; border-radius:8px; position:relative; overflow:visible; cursor:default;}
  .room.highlight{border-color:#e59b83;}
  .room .label{position:absolute; top:-9px; left:10px; background:var(--chip); color:#f0ecdd; font-size:11px; padding:3px 9px; border-radius:4px; z-index:5;}
  .room .plant{position:absolute; top:6px; right:8px; font-size:12px; opacity:.85;}
  .room .floor{position:absolute; inset:22px 12px 10px; background:var(--floor); border-radius:4px;}
  .hint{position:absolute; bottom:8px; left:12px; font-size:11px; color:#8a8378; background:rgba(0,0,0,.25); padding:3px 8px; border-radius:4px;}

  .desk{position:absolute; width:78px; height:22px; background:#7d5f42; border-radius:2px; box-shadow:0 4px 0 #5e4730;}
  .desk::after{content:""; position:absolute; right:8px; top:-2px; width:10px; height:6px; background:#efe9dc; border:2px solid #23201c; border-bottom-width:1px;}
  .coffee{position:absolute; width:22px; height:30px; background:#23201c; border-radius:2px;}
  .coffee::after{content:"☕"; position:absolute; font-size:10px; left:5px; top:9px;}
  .coffee-label{position:absolute; font-size:10px; color:#9b937f;}

  /* pixel character */
  .char{position:absolute; width:30px; cursor:pointer; transition:left 1.6s linear, top 1.6s linear; z-index:4; image-rendering:pixelated;}
  .char .nametag{position:absolute; bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:3px; background:#f5f1e6; color:#2b2521; font-size:10px; white-space:nowrap; padding:2px 7px; border-radius:3px; box-shadow:0 1px 0 rgba(0,0,0,.4);}
  .char .bubble{position:absolute; bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:24px; background:#efe6df; color:#4a423a; font-size:10px; white-space:nowrap; max-width:190px; overflow:hidden; text-overflow:ellipsis; padding:3px 9px; border-radius:8px; display:none; z-index:6;}
  .char.talking .bubble{display:block;}
  .char .px{margin:0 auto;}
  .char .hair{width:18px; height:7px; background:#2a211a; border-radius:2px 2px 0 0;}
  .char .face{width:18px; height:8px; background:#f2c9a0; position:relative;}
  .char .face::before,.char .face::after{content:""; position:absolute; top:2px; width:2px; height:3px; background:#2a211a;}
  .char .face::before{left:3px;} .char .face::after{right:3px;}
  .char .torso{width:22px; height:11px; background:var(--shirt,#888);}
  .char .legs{width:12px; height:5px; background:#2a2622;}
  .char .shadow{width:22px; height:4px; background:rgba(0,0,0,.35); border-radius:50%; margin-top:1px;}
  .char.working .torso{animation:bob 1.1s infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(1.5px)}}
  .char .dot{position:absolute; top:-4px; right:-1px; width:7px; height:7px; border-radius:50%; background:#e6b23c; display:none;}
  .char.working .dot{display:block;}

  /* ── panel (right) ── */
  #panel{flex:1; background:var(--panel); border-radius:14px; display:flex; flex-direction:column; min-width:0; border:1px solid var(--line);}
  .p-head{display:flex; gap:14px; align-items:center; padding:18px 20px 12px;}
  .p-avatar{width:46px; height:46px; border-radius:50%; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;}
  .p-head h2{font-size:17px;}
  .p-head p{font-size:12px; color:var(--sub); margin-top:3px; line-height:1.5;}
  .tabs{display:flex; gap:8px; padding:6px 20px 14px; border-bottom:1px solid var(--line);}
  .tab{font-size:12px; padding:6px 14px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer;}
  .tab.active{background:var(--chip); color:#fff; border-color:var(--chip);}
  #tabBody{flex:1; overflow-y:auto; padding:18px 20px;}
  .empty{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--sub); font-size:13px; gap:10px; text-align:center; line-height:1.7;}
  .empty .ico{font-size:22px;}

  .task{border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .task .meta{font-size:11px; color:var(--sub); margin-bottom:8px; display:flex; align-items:center; gap:6px;}
  .task .meta .m-dot{width:7px;height:7px;border-radius:50%;background:#e6b23c;}
  .task .meta .m-dot.done{background:var(--green);}
  .task .instruction{background:var(--accent-soft); color:#b4432e; font-size:13px; line-height:1.6; padding:10px 14px; border-radius:8px; margin-bottom:10px; white-space:pre-wrap;}
  .task .instruction.teach{background:#e9f0e6; color:#3c6e4c;}
  .task .result{font-size:13px; line-height:1.75; white-space:pre-wrap; color:var(--ink); border-top:1px dashed var(--line); padding-top:10px;}
  .task .working-note{font-size:12px; color:var(--sub);}
  .task .copybtn{margin-top:8px; font-size:11px; border:1px solid var(--line); background:#faf8f2; border-radius:6px; padding:4px 10px; cursor:pointer; color:var(--sub);}
  .jobdesc{font-size:13px; line-height:1.85; white-space:pre-wrap;}
  .jobdesc h3{font-size:13px; margin:14px 0 4px;}
  .memory-item, .diary-item{border-bottom:1px solid var(--line); padding:10px 2px; font-size:13px; line-height:1.6;}
  .memory-item .when, .diary-item .when{font-size:11px; color:var(--sub); margin-bottom:3px;}

  /* composer */
  .composer{border-top:1px solid var(--line); padding:12px 16px 16px;}
  .modes{display:flex; gap:16px; font-size:13px; margin-bottom:8px;}
  .modes label{display:flex; align-items:center; gap:6px; cursor:pointer;}
  .modes input{accent-color:var(--accent);}
  .c-row{display:flex; gap:10px;}
  textarea{flex:1; resize:none; height:64px; border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:13px; font-family:inherit; background:#fff; color:var(--ink);}
  textarea:focus{outline:none; border-color:#d8b8a8;}
  #sendBtn{width:84px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; font-family:inherit;}
  #sendBtn:disabled{background:#dcd4c6; cursor:not-allowed;}
</style>
</head>

lounge.insertAdjacentHTML('beforeend', `<div class="coffee" style="left:18%;top:18%"></div><div class="coffee-label" style="left:8%;top:62%">☕ 커피머신</div>`);

STAFF.forEach(s => {
  const floor = document.querySelector(`#room-${s.room} .floor`);
  floor.insertAdjacentHTML('beforeend', `<div class="desk" style="left:30%;top:52%"></div>`);
  const c = document.createElement('div');

  s.el = c; s.home = floor; s.state = 'idle';
});

/* break-time wandering */
function wander(){
  const idle = STAFF.filter(s => s.state === 'idle');
  if (idle.length && Math.random() < .5){
    const s = idle[Math.floor(Math.random()*idle.length)];
    s.state = 'break';
    lounge.appendChild(s.el);
    s.el.style.left = (30 + Math.random()*40) + '%'; s.el.style.top = (25 + Math.random()*35) + '%';
    say(s, '☕ 잠깐 휴식...', 14000);
    setTimeout(() => { if(s.state==='break'){ goHome(s); s.state='idle'; } }, 15000);
  }
  setTimeout(wander, 25000 + Math.random()*40000);
}
function goHome(s){ s.home.appendChild(s.el); s.el.style.left='38%'; s.el.style.top='18%'; }
function say(s, text, ms){
  const b = s.el.querySelector('.bubble');
  b.textContent = text; s.el.classList.add('talking');
  clearTimeout(s._sayT);
  if (ms) s._sayT = setTimeout(() => s.el.classList.remove('talking'), ms);
}
setTimeout(wander, 8000);

/* ───────────────────────── panel ───────────────────────── */
const tabBody = document.getElementById('tabBody');
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); activeTab = t.dataset.tab; renderTab();
}));

function select(id){
  selected = STAFF.find(s => s.id === id);
  document.querySelectorAll('.room').forEach(r => r.classList.remove('highlight'));
  document.getElementById('room-' + selected.room).classList.add('highlight');
  document.getElementById('pAvatar').textContent = selected.emoji;
  document.getElementById('pName').textContent = selected.name;
  document.getElementById('pDesc').textContent = selected.desc;
  document.getElementById('sendBtn').disabled = false;
  renderTab();
}

function fmt(ts){
  const d = new Date(ts);
  const h = d.getHours(); const ap = h < 12 ? '오전' : '오후';
  const hh = h % 12 === 0 ? 12 : h % 12;
  return `${ap} ${hh}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function esc(x){ const d = document.createElement('div'); d.textContent = x; return d.innerHTML; }

function renderTab(){
  if (!selected){ return; }
  if (activeTab === 'work') return renderWork();
  if (activeTab === 'job'){
    tabBody.innerHTML = `<div class="jobdesc">${esc(selected.job).replace(/## (.+)/g,'<h3>$1</h3>')}</div>`;
    return;
  }
  if (activeTab === 'memory'){
    const items = store.load(selected.id, 'memory');
    tabBody.innerHTML = items.length
      ? items.map(m => `<div class="memory-item"><div class="when">🎓 ${fmt(m.ts)}</div>${esc(m.text)}</div>`).join('')
      : `<div class="empty"><span class="ico">🎓</span>아직 배운 교훈이 없습니다.<br>아래에서 '가르치기'로 피드백을 남기면 기억합니다.</div>`;
    return;
  }
  if (activeTab === 'diary'){
    const items = store.load(selected.id, 'diary');
    tabBody.innerHTML = items.length
      ? items.slice().reverse().map(m => `<div class="diary-item"><div class="when">${fmt(m.ts)}</div>${esc(m.text)}</div>`).join('')
      : `<div class="empty"><span class="ico">📓</span>아직 업무 일지가 없습니다.</div>`;
  }
}

function renderWork(){
  const tasks = store.load(selected.id, 'tasks');
  if (!tasks.length){
    tabBody.innerHTML = `<div class="empty"><span class="ico">💼</span>아직 업무 이력이 없습니다.<br>아래에 첫 지시를 입력해 보세요.</div>`;
    return;
  }
  tabBody.innerHTML = tasks.map(t => {
    const dotCls = t.status === 'done' ? 'm-dot done' : 'm-dot';
    const statusLine = t.status === 'working'
      ? `<div class="working-note">⏳ 작업 중…</div>`
      : (t.result ? `<div class="result">${esc(t.result)}</div>` : '');
    const copy = t.prompt ? `<button class="copybtn" data-copy="${encodeURIComponent(t.prompt)}">📋 Claude Code용 프롬프트 복사</button>` : '';
    const label = t.mode === 'teach' ? '🎓 가르치기' : '🎯 업무 지시';
    return `<div class="task">
      <div class="meta"><span class="${dotCls}"></span> ${label} · ${fmt(t.ts)}${t.dur ? ` · 소요 ${t.dur}초` : ''}</div>
      <div class="instruction ${t.mode === 'teach' ? 'teach' : ''}">${esc(t.text)}</div>
      ${statusLine}${copy}
    </div>`;
  }).join('');
  tabBody.querySelectorAll('.copybtn').forEach(b => b.addEventListener('click', () => {
    navigator.clipboard.writeText(decodeURIComponent(b.dataset.copy));
    b.textContent = '✅ 복사됨';
  }));
  tabBody.scrollTop = tabBody.scrollHeight;
}

/* ───────────────────────── work engine ───────────────────────── */
function diary(id, text){
  const d = store.load(id, 'diary'); d.push({ts: Date.now(), text}); store.save(id, 'diary', d);
}

function buildPrompt(s, text){
  const mem = store.load(s.id, 'memory').map(m => `- ${m.text}`).join('\n');
  return `${s.name}(${s.id}) 서브에이전트로 다음 업무를 처리해줘. 시작 전에 CLAUDE.md와 담당 MOC를 꼭 읽어.\n\n업무 지시:\n${text}${mem ? `\n\n대표가 가르쳐준 교훈 (반드시 반영):\n${mem}` : ''}`;
}

async function callClaude(s, text){
  const key = localStorage.getItem('bp.apikey');
  if (!key) return null;
  const mem = store.load(s.id, 'memory').map(m => `- ${m.text}`).join('\n');
  const sys = `너는 뷰티파크(피부·미용 병의원)의 AI 직원 '${s.name}'이다.\n${s.desc}\n\n직무기술서:\n${s.job}\n\n규칙: 의료광고법 준수(효과 보장·과장·치료경험담·비교비방 금지), 출처 없는 의학 주장 금지, 개인정보 익명화. 한국어로, 결론 먼저 간결하게.${mem ? `\n\n대표가 가르쳐준 교훈 (반드시 반영):\n${mem}` : ''}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: MODEL, max_tokens: 2000, system: sys, messages: [{role:'user', content: text}] }),
  });
  if (!res.ok) throw new Error('API 오류 ' + res.status);
  const data = await res.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
}

document.getElementById('sendBtn').addEventListener('click', async () => {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !selected) return;
  const mode = document.querySelector('input[name=mode]:checked').value;
  const s = selected;
  input.value = '';

  if (mode === 'teach'){
    const mem = store.load(s.id, 'memory'); mem.push({ts: Date.now(), text}); store.save(s.id, 'memory', mem);
    const tasks = store.load(s.id, 'tasks');
    tasks.push({ts: Date.now(), mode:'teach', text, status:'done', result:'배웠습니다! 앞으로의 업무에 반영하겠습니다. (기억·교훈 탭에 저장됨)'});
    store.save(s.id, 'tasks', tasks);
    diary(s.id, `교훈 학습: "${text.slice(0,40)}${text.length>40?'…':''}"`);
    say(s, '🎓 배웠습니다!', 5000);
    renderTab();
    return;
  }

  /* task */
  const t = {ts: Date.now(), mode:'task', text, status:'working', result:null, prompt: buildPrompt(s, text)};
  const tasks = store.load(s.id, 'tasks'); tasks.push(t); store.save(s.id, 'tasks', tasks);
  diary(s.id, `업무 지시 접수: "${text.slice(0,40)}${text.length>40?'…':''}"`);
  if (s.state === 'break'){ goHome(s); }
  s.state = 'working';
  s.el.classList.add('working');
  say(s, '📌 ' + text.slice(0, 24) + (text.length > 24 ? '…' : ''));
  renderTab();

  const started = Date.now();
  let result;
  try{
    result = await callClaude(s, text);
    if (result === null){
      result = `(시뮬레이션 모드) 접수했습니다.\n\n실제로 일하게 하는 방법 두 가지:\n① 오른쪽 위 [⚙ API 키]에 Anthropic API 키를 넣으면 이 화면에서 바로 답합니다.\n② 아래 [프롬프트 복사]를 눌러 옵시디언 볼트에서 Claude Code에 붙여넣으면, 위키를 읽고 쓰면서 진짜 업무를 수행합니다.`;
      await new Promise(r => setTimeout(r, 4000 + Math.random()*3000));
    }
  }catch(e){
    result = '⚠️ ' + e.message + ' — API 키를 확인하세요.';
  }
  const all = store.load(s.id, 'tasks');
  const mine = all.find(x => x.ts === t.ts);
  if (mine){ mine.status = 'done'; mine.result = result; mine.dur = Math.round((Date.now() - started)/1000); }
  store.save(s.id, 'tasks', all);
  diary(s.id, `업무 완료 (${Math.round((Date.now() - started)/1000)}초)`);
  s.state = 'idle';
  s.el.classList.remove('working');
  s.el.classList.remove('talking');
  if (selected && selected.id === s.id && activeTab === 'work') renderTab();
});

function setKey(){
  const cur = localStorage.getItem('bp.apikey') || '';
  const k = prompt('Anthropic API 키 (sk-ant-…)\n비우고 확인하면 시뮬레이션 모드로 전환됩니다.\n⚠️ 키는 이 브라우저의 localStorage에만 저장됩니다.', cur);
  if (k === null) return;
  if (k.trim()) localStorage.setItem('bp.apikey', k.trim());
  else localStorage.removeItem('bp.apikey');
  alert(k.trim() ? '저장되었습니다. 이제 직원이 실제로 답합니다.' : '시뮬레이션 모드입니다.');
}
</script>
