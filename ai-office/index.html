<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뷰티파크 AI 사무실</title>
<style>
  :root{
    --bg:#f0ecdd; --panel:#ffffff; --ink:#3b3630; --sub:#8a8378;
    --office:#2b2521; --room:#38312a; --floor:#453d34; --chip:#1f1b17;
    --accent:#e0674f; --accent-soft:#fbe7e2; --line:#e5dfd2; --green:#4c9a63;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden;}

  /* ── header ── */
  header{display:flex; align-items:baseline; gap:12px; padding:14px 22px;}
  header h1{font-size:22px; letter-spacing:-.5px;}
  header .sub{font-size:13px; color:var(--sub);}
  header .spacer{flex:1;}
  .status-badge{font-size:12px; color:#3c7a4f; background:#fff; border:1px solid var(--line); border-radius:999px; padding:5px 14px;}
  .status-badge::before{content:"●"; color:var(--green); margin-right:6px; font-size:9px;}
  .gear{cursor:pointer; border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 12px; font-size:12px; color:var(--sub);}

  main{flex:1; display:flex; gap:16px; padding:0 16px 16px; min-height:0;}

  /* ── office (left) ── */
  #office{flex:1.1; background:var(--office); border-radius:14px; padding:14px; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:12px; position:relative; min-width:0;}
  .room{background:var(--room); border:2px solid transparent; border-radius:8px; position:relative; overflow:visible; cursor:default;}
  .room.highlight{border-color:#e59b83;}
  .room .label{position:absolute; top:-9px; left:10px; background:var(--chip); color:#f0ecdd; font-size:11px; padding:3px 9px; border-radius:4px; z-index:5;}
  .room .plant{position:absolute; top:6px; right:8px; font-size:12px; opacity:.85;}
  .room .floor{position:absolute; inset:22px 12px 10px; background:var(--floor); border-radius:4px;}
  .hint{position:absolute; bottom:8px; left:12px; font-size:11px; color:#8a8378; background:rgba(0,0,0,.25); padding:3px 8px; border-radius:4px;}

  .desk{position:absolute; width:78px; height:22px; background:#7d5f42; border-radius:2px; box-shadow:0 4px 0 #5e4730;}
  .desk::after{content:""; position:absolute; right:8px; top:-2px; width:10px; height:6px; background:#efe9dc; border:2px solid #23201c; border-bottom-width:1px;}
  .coffee{position:absolute; width:22px; height:30px; background:#23201c; border-radius:2px;}
  .coffee::after{content:"☕"; position:absolute; font-size:10px; left:5px; top:9px;}
  .coffee-label{position:absolute; font-size:10px; color:#9b937f;}

  /* pixel character */
  .char{position:absolute; width:30px; cursor:pointer; transition:left 1.6s linear, top 1.6s linear; z-index:4; image-rendering:pixelated;}
  .char .nametag{position:absolute; bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:3px; background:#f5f1e6; color:#2b2521; font-size:10px; white-space:nowrap; padding:2px 7px; border-radius:3px; box-shadow:0 1px 0 rgba(0,0,0,.4);}
  .char .bubble{position:absolute; bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:24px; background:#efe6df; color:#4a423a; font-size:10px; white-space:nowrap; max-width:190px; overflow:hidden; text-overflow:ellipsis; padding:3px 9px; border-radius:8px; display:none; z-index:6;}
  .char.talking .bubble{display:block;}
  .char .px{margin:0 auto;}
  .char .hair{width:18px; height:7px; background:#2a211a; border-radius:2px 2px 0 0;}
  .char .face{width:18px; height:8px; background:#f2c9a0; position:relative;}
  .char .face::before,.char .face::after{content:""; position:absolute; top:2px; width:2px; height:3px; background:#2a211a;}
  .char .face::before{left:3px;} .char .face::after{right:3px;}
  .char .torso{width:22px; height:11px; background:var(--shirt,#888);}
  .char .legs{width:12px; height:5px; background:#2a2622;}
  .char .shadow{width:22px; height:4px; background:rgba(0,0,0,.35); border-radius:50%; margin-top:1px;}
  .char.working .torso{animation:bob 1.1s infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(1.5px)}}
  .char .dot{position:absolute; top:-4px; right:-1px; width:7px; height:7px; border-radius:50%; background:#e6b23c; display:none;}
  .char.working .dot{display:block;}

  /* ── panel (right) ── */
  #panel{flex:1; background:var(--panel); border-radius:14px; display:flex; flex-direction:column; min-width:0; border:1px solid var(--line);}
  .p-head{display:flex; gap:14px; align-items:center; padding:18px 20px 12px;}
  .p-avatar{width:46px; height:46px; border-radius:50%; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;}
  .p-head h2{font-size:17px;}
  .p-head p{font-size:12px; color:var(--sub); margin-top:3px; line-height:1.5;}
  .tabs{display:flex; gap:8px; padding:6px 20px 14px; border-bottom:1px solid var(--line);}
  .tab{font-size:12px; padding:6px 14px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink); cursor:pointer;}
  .tab.active{background:var(--chip); color:#fff; border-color:var(--chip);}
  #tabBody{flex:1; overflow-y:auto; padding:18px 20px;}
  .empty{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--sub); font-size:13px; gap:10px; text-align:center; line-height:1.7;}
  .empty .ico{font-size:22px;}

  .task{border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:14px;}
  .task .meta{font-size:11px; color:var(--sub); margin-bottom:8px; display:flex; align-items:center; gap:6px;}
  .task .meta .m-dot{width:7px;height:7px;border-radius:50%;background:#e6b23c;}
  .task .meta .m-dot.done{background:var(--green);}
  .task .instruction{background:var(--accent-soft); color:#b4432e; font-size:13px; line-height:1.6; padding:10px 14px; border-radius:8px; margin-bottom:10px; white-space:pre-wrap;}
  .task .instruction.teach{background:#e9f0e6; color:#3c6e4c;}
  .task .result{font-size:13px; line-height:1.75; white-space:pre-wrap; color:var(--ink); border-top:1px dashed var(--line); padding-top:10px;}
  .task .working-note{font-size:12px; color:var(--sub);}
  .task .copybtn{margin-top:8px; font-size:11px; border:1px solid var(--line); background:#faf8f2; border-radius:6px; padding:4px 10px; cursor:pointer; color:var(--sub);}
  .jobdesc{font-size:13px; line-height:1.85; white-space:pre-wrap;}
  .jobdesc h3{font-size:13px; margin:14px 0 4px;}
  .memory-item, .diary-item{border-bottom:1px solid var(--line); padding:10px 2px; font-size:13px; line-height:1.6;}
  .memory-item .when, .diary-item .when{font-size:11px; color:var(--sub); margin-bottom:3px;}

  /* composer */
  .composer{border-top:1px solid var(--line); padding:12px 16px 16px;}
  .modes{display:flex; gap:16px; font-size:13px; margin-bottom:8px;}
  .modes label{display:flex; align-items:center; gap:6px; cursor:pointer;}
  .modes input{accent-color:var(--accent);}
  .c-row{display:flex; gap:10px;}
  textarea{flex:1; resize:none; height:64px; border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:13px; font-family:inherit; background:#fff; color:var(--ink);}
  textarea:focus{outline:none; border-color:#d8b8a8;}
  #sendBtn{width:84px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:15px; cursor:pointer; font-family:inherit;}
  #sendBtn:disabled{background:#dcd4c6; cursor:not-allowed;}
</style>
</head>

<header>

    const c = this.cfg(); if (!c){ return { ok:false, reason:'no-config' }; }
    this._lastErr = null;
    const remote = await this.pull();
    if (this._lastErr){ return { ok:false, reason: this._lastErr.missingTable ? 'no-table' : 'error', err: this._lastErr }; }
    if (remote && remote.data) applySnapshot(remote.data);
    // 로컬을 다시 올려 원격과 합치기(전체 스냅샷 last-write-wins)
    const body = [{ id: this.rowId(), data: snapshot(), updated_at: new Date(nowTs()).toISOString() }];
    try{
      const r = await fetch(`${c.url}/rest/v1/office_state`, { method:'POST', headers:{ ...this.headers(c), Prefer:'resolution=merge-duplicates' }, body: JSON.stringify(body) });
      if (!r.ok){ const t = await r.text().catch(()=> ''); const missing = r.status === 404 || /PGRST205|42P01|does not exist|Could not find the table/i.test(t); return { ok:false, reason: missing ? 'no-table' : 'error' }; }
    }catch(e){ return { ok:false, reason:'error', err:e }; }
    return { ok:true };
  },
};

function buildPrompt(s, text){

  return `${s.name}(${s.id}) 서브에이전트로 다음 업무를 처리해줘. 시작 전에 CLAUDE.md와 담당 MOC를 꼭 읽어.\n\n업무 지시:\n${text}${mem ? `\n\n대표가 가르쳐준 교훈 (반드시 반영):\n${mem}` : ''}`;
}

async function callLLM(s, text){
  const key = localStorage.getItem('bp.apikey');
  if (!key) return null;
  const provider = providerOf(key);
  await wikiReady;
  const wiki = wikiContext(s);
  const mem = store.load(s.id, 'memory').map(m => `- ${m.text}`).join('\n');
  const sys = `너는 ${BRAND.name}(${BRAND.biz})의 AI 직원 '${s.name}'이다. 현재 ${modelLabel(provider)} 모델로 구동되고 있다 — 어떤 모델이냐고 물으면 이 사실대로 답한다.\n${s.desc}\n\n직무기술서:\n${s.job}\n\n규칙: ${BRAND.rules}. 한국어로, 결론 먼저 간결하게.${mem ? `\n\n대표가 가르쳐준 교훈 (반드시 반영):\n${mem}` : ''}${wiki ? `\n\n[사내 위키 발췌 — 답변의 근거로 사용하라. 문서가 seed 상태(빈 뼈대)면 그 사실을 밝히고 일반 원칙으로 답하되, 위키에 채워 넣을 내용을 함께 제안하라]\n${wiki}` : ''}`;

  if (provider === 'gemini'){
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELS.gemini}:generateContent`, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-goog-api-key': key },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: sys }] },
        contents: [{ role: 'user', parts: [{ text }] }],
        generationConfig: { maxOutputTokens: 2000 },
      }),
    });
    if (!res.ok) throw new Error('Gemini API 오류 ' + res.status);
    const data = await res.json();
    const out = (data.candidates?.[0]?.content?.parts || []).map(p => p.text || '').join('\n').trim();
    if (!out) throw new Error('Gemini 응답이 비어 있습니다 (안전 필터 또는 토큰 한도)');
    return { text: out, model: modelLabel('gemini') };
  }

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: MODELS.anthropic, max_tokens: 2000, system: sys, messages: [{role:'user', content: text}] }),
  });
  if (!res.ok) throw new Error('Claude API 오류 ' + res.status);
  const data = await res.json();
  return { text: data.content.filter(b => b.type === 'text').map(b => b.text).join('\n'), model: modelLabel('anthropic') };
}

const STAFF_KEYWORDS = {
  'marketing-pd': ['마케팅','광고','유입','노출','네이버','검색','채널','신환'],
  'consult-lead': ['상담','전환','가격','문의','이탈','스크립트'],
  'ops-manager': ['직원','교육','운영','CS','프로세스','사기','노쇼','매뉴얼'],
  'content-writer': ['콘텐츠','대본','블로그','유튜브','카드뉴스','원고','SNS'],
  'medical-factchecker': ['의학','시술','부작용','의료법','광고법','검수','성분'],
  'exec-assistant': ['매출','KPI','비용','수익','성과','숫자','객단가'],
};
function pickAttendees(rawText){
  const m = rawText.match(/[\(（]?\s*참석\s*[:\-–]\s*([^\)）]+)[\)）]?/);
  let topic = rawText, attendees = [];
  if (m){
    topic = rawText.replace(m[0], '').trim();
    attendees = m[1].split(/[,·、\s]+/).map(n => STAFF.find(s => s.name === n.trim())).filter(Boolean);
  }
  if (attendees.length < 2){
    const scored = Object.entries(STAFF_KEYWORDS)
      .map(([id, ws]) => [id, ws.filter(w => rawText.includes(w)).length])
      .sort((a, b) => b[1] - a[1]);
    const picked = scored[0][1] > 0 ? scored.slice(0, 2).map(([id]) => id) : ['consult-lead', 'ops-manager'];
    attendees = picked.map(id => STAFF.find(s => s.id === id));
  }
  return { topic, attendees: attendees.slice(0, 3) };
}

async function runMeeting(rawText){
  const host = STAFF.find(x => x.id === 'chief-librarian');
  select(host.id);
  const { topic, attendees } = pickAttendees(rawText);
  const names = attendees.map(a => a.name).join(' · ');

  const t = {ts: Date.now(), mode:'meeting', text: `[회의] ${topic}\n👥 참석: ${names} / 사회: 비서실장`, status:'working', result:null};
  const tasks = store.load(host.id, 'tasks'); tasks.push(t); store.save(host.id, 'tasks', tasks);
  diary(host.id, `회의 소집: "${topic.slice(0,30)}${topic.length>30?'…':''}" (참석: ${names})`);
  renderTab();

  const secFloor = document.querySelector('#room-secretary .floor');
  const inMeeting = [host, ...attendees];
  inMeeting.forEach((s, i) => {
    s.state = 'working'; s.el.classList.add('working');
    secFloor.appendChild(s.el);
    s.el.style.left = (15 + i * 22) + '%'; s.el.style.top = '30%';
    say(s, '🗣 회의 중...');
  });

  const started = Date.now();
  let transcript;
  try{
    const r1 = await Promise.all(attendees.map(a => callLLM(a,
      `회의 발언 요청. 안건: "${topic}"\n너의 전문 영역 관점에서 ① 원인·현황 진단 ② 구체적 방안 2~3개(누가·뭘·어떻게) ③ 최우선 1개와 이유를 회의 말투(존댓말 구어체)로 발언하라. 추상적 조언 금지. 500자 내외.`)));
    const r2 = await Promise.all(attendees.map((a, i) => {
      const others = attendees.map((b, j) => i === j ? null : `[${b.name}]: ${r1[j].text}`).filter(Boolean).join('\n\n');
      return callLLM(a, `회의 2라운드. 안건: "${topic}"\n다른 참석자의 발언:\n${others}\n\n이에 대해 ① 동의 지점 ② 이견·반박 ③ 두 안을 합친 실행 순서 제안을 회의 말투로 350자 내외.`);
    }));
    const allStatements = attendees.map((a, i) => `### ${a.name} (1라운드)\n${r1[i].text}\n\n### ${a.name} (2라운드)\n${r2[i].text}`).join('\n\n');
    const syn = await callLLM(host,
      `너는 이 회의의 사회자다. 안건: "${topic}"\n참석자 발언 전문:\n\n${allStatements}\n\n비서실장으로서 결론을 정리하라: ① 합의된 방향(실행 순서·담당 포함) ② 남은 이견(숨기지 말 것 — "대표 판단 필요"로 명시) ③ 직원별 액션 아이템. 600자 내외.`);

    const today = new Date();
    const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    transcript = `📋 회의 — ${topic}\n👥 참석: ${names} / 사회: 비서실장\n\n${attendees.map((a,i)=>`【1라운드 · ${a.name}】\n${r1[i].text}`).join('\n\n')}\n\n${attendees.map((a,i)=>`【2라운드 · ${a.name}】\n${r2[i].text}`).join('\n\n')}\n\n【결론 · 비서실장】\n${syn.text}`;
    t.prompt = `---\nstatus: draft\nupdated: ${dateStr}\nowner: AI사서\ntags: [회의록]\n---\n\n# 📋 회의록 — ${topic}\n\n- **일시**: ${dateStr}\n- **참석**: ${names} / **사회**: 비서실장\n\n${transcript.split('\n').slice(2).join('\n')}\n\n> 볼트의 02_AI_Wiki/meetings/${dateStr}_회의.md 로 저장하고 [[meetings_MOC]]에 등록하세요.`;
    t.copyLabel = '📋 회의록 markdown 복사 (볼트 저장용)';
    t.model = syn.model;
  }catch(e){
    transcript = '⚠️ 회의 진행 중 오류: ' + e.message;
  }
  const all = store.load(host.id, 'tasks');
  const mine = all.find(x => x.ts === t.ts);
  if (mine){ Object.assign(mine, t); mine.status = 'done'; mine.result = transcript; mine.dur = Math.round((Date.now() - started)/1000); }
  store.save(host.id, 'tasks', all);
  diary(host.id, `회의 종료 (${Math.round((Date.now() - started)/1000)}초)`);
  inMeeting.forEach(s => { s.state = 'idle'; s.el.classList.remove('working'); s.el.classList.remove('talking'); goHome(s); });
  if (selected && selected.id === host.id && activeTab === 'work') renderTab();
}

      await new Promise(r2 => setTimeout(r2, 4000 + Math.random()*3000));
    } else {
      result = r.text; usedModel = r.model;
    }
  }catch(e){
    result = '⚠️ ' + e.message + ' — API 키를 확인하세요.';
  }
  const all = store.load(s.id, 'tasks');
  const mine = all.find(x => x.ts === t.ts);
  if (mine){ mine.status = 'done'; mine.result = result; mine.dur = Math.round((Date.now() - started)/1000); mine.model = usedModel; }
  store.save(s.id, 'tasks', all);
  diary(s.id, `업무 완료 (${Math.round((Date.now() - started)/1000)}초)`);
  s.state = 'idle';
  s.el.classList.remove('working');
  s.el.classList.remove('talking');
  if (selected && selected.id === s.id && activeTab === 'work') renderTab();
});

function setKey(){
  const cur = localStorage.getItem('bp.apikey') || '';
  const k = prompt('API 키 입력\n· sk-ant-… → Claude\n· 그 외 전부(AIza…, AQ.… 등) → Google Gemini\n비우고 확인하면 시뮬레이션 모드로 전환됩니다.\n⚠️ 키는 이 브라우저의 localStorage에만 저장됩니다.', cur);
  if (k === null) return;
  if (k.trim()){
    localStorage.setItem('bp.apikey', k.trim());
    alert(`저장되었습니다. ${modelLabel(providerOf(k.trim()))} 로 직원이 실제로 답합니다.`);
  } else {
    localStorage.removeItem('bp.apikey');
    alert('시뮬레이션 모드입니다.');
  }
  updateKeyBadge();
}
updateKeyBadge();

/* ── 동기화 UI ── */
function openSync(){
  const c = cloud.cfg();
  const msg = `기억 동기화 방법을 고르세요:\n\n` +
    `1 = 클라우드 자동 동기화 켜기/변경 (Supabase — 어느 기기든 자동)\n` +
    `2 = 기억 내보내기 (파일로 저장, 설정 없이 안전)\n` +
    `3 = 기억 가져오기 (다른 기기에서 내보낸 파일)\n` +
    `4 = 지금 즉시 동기화 (클라우드 켠 경우)\n` +
    (c ? `0 = 클라우드 동기화 끄기\n\n현재: 켜짐 (${c.tag || 'default'})` : `\n현재: 꺼짐 (로컬 저장만)`);
  const pick = prompt(msg, '1');
  if (pick === null) return;
  if (pick.trim() === '1') setupSupabase();
  else if (pick.trim() === '2') exportMemory();
  else if (pick.trim() === '3') importMemory();
  else if (pick.trim() === '4') { cloud.syncNow().then(st => { alert(st.ok ? '동기화 완료. 새로고침하면 반영됩니다.' : (st.reason==='no-config' ? '먼저 클라우드 동기화를 켜세요(1번).' : st.reason==='no-table' ? '테이블이 없습니다. 1번을 다시 실행해 SQL 안내를 받으세요.' : '동기화 실패. URL/키를 확인하세요.')); if(st.ok) renderTab(); }); }
  else if (pick.trim() === '0') { localStorage.removeItem('bp.sync.supabase'); setSyncBadge('☁ 동기화'); alert('클라우드 동기화를 껐습니다. (로컬 저장은 유지)'); }
}
function setupSupabase(){
  const cur = cloud.cfg() || {};
  const url = prompt('① Supabase 프로젝트 URL\n예: https://xxxx.supabase.co\n\n(무료 프로젝트 생성 후 Settings → API 에서 확인)', cur.url || '');
  if (url === null || !url.trim()) return;
  const key = prompt('② Supabase anon public key\n(Settings → API → Project API keys → anon public)', cur.key || '');
  if (key === null || !key.trim()) return;
  const tag = prompt('③ 기억 이름표 (기기 간 같은 값이면 같은 기억을 공유)\n예: 원장, 데스크1', cur.tag || 'default');
  if (tag === null) return;
  const cleanUrl = url.trim().replace(/\/$/,'');
  localStorage.setItem('bp.sync.supabase', JSON.stringify({ url: cleanUrl, key: key.trim(), tag: (tag.trim()||'default') }));
  setSyncBadge('☁ 동기화 중…');
  cloud.syncNow().then(st => {
    if (st.ok){
      setSyncBadge('☁ 동기화됨');
      alert('✅ 클라우드 동기화를 켰습니다!\n이제 같은 URL·키·이름표를 넣은 어느 기기에서든 학습·기억이 이어집니다.\n(다른 기기에서 처음 켜면 새로고침하세요.)');
      renderTab();
    } else if (st.reason === 'no-table'){
      setSyncBadge('⚠ 테이블 필요');
      showTableSetup(cleanUrl);
    } else {
      setSyncBadge('⚠ 동기화 실패');
      alert('연결 실패. URL과 anon key를 다시 확인하세요.\n(URL 예: https://xxxx.supabase.co)');
    }
  });
}
// 테이블 만들기 안내 — SQL 복사 + SQL 에디터 바로가기
function showTableSetup(url){
  const link = sqlEditorLink(url);
  navigator.clipboard && navigator.clipboard.writeText(SETUP_SQL).catch(()=>{});
  const go = confirm('거의 다 됐어요! 딱 한 단계 남았습니다.\n\nSupabase에 저장 테이블이 아직 없습니다. 아래 SQL이 클립보드에 복사됐어요:\n\n' + SETUP_SQL + '\n\n[확인]을 누르면 Supabase SQL 에디터가 새 탭으로 열립니다 → 붙여넣기(Ctrl+V) → RUN → 그 다음 ☁ 동기화 → 4번(지금 동기화).');
  if (go) window.open(link, '_blank');
}
function exportMemory(){
  const blob = new Blob([JSON.stringify({ brand: BRAND.key, exportedAt: new Date(nowTs()).toISOString(), data: snapshot() }, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${BRAND.key}-사무실기억-${new Date(nowTs()).toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
function importMemory(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json,.json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try{
        const obj = JSON.parse(rd.result);
        const n = applySnapshot(obj.data || obj);
        cloud.push();
        alert(`가져오기 완료: ${n}개 항목 복원. 새로고침하면 반영됩니다.`);
        renderTab();
      }catch(e){ alert('파일을 읽을 수 없습니다: ' + e.message); }
    };
    rd.readAsText(f);
  };
  inp.click();
}
function updateSyncBadge(){ setSyncBadge(cloud.cfg() ? '☁ 동기화됨' : '☁ 동기화'); }
updateSyncBadge();
// 클라우드가 켜져 있으면 시작 시 원격 기억을 끌어와 병합
if (cloud.cfg()){
  cloud.pull().then(remote => {
    if (remote && remote.data){ applySnapshot(remote.data); setSyncBadge('☁ 동기화됨'); if (selected) renderTab(); }
  });
}
</script>
